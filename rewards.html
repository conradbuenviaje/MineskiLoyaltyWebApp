<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mineski Infinity - Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .bottom-nav {
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .reward-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="gradient-bg text-white pb-24">
    <!-- Header -->
    <div class="px-6 pt-12 pb-4 sticky top-0 bg-[#0f0f1a]/90 backdrop-blur-md z-40">
        <div class="flex items-center gap-4 mb-4">
            <button onclick="history.back()" class="p-2 -ml-2 hover:bg-white/10 rounded-full">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </button>
            <h1 class="text-2xl font-bold">Rewards Store</h1>
        </div>
        
        <!-- Points Display -->
        <div class="flex justify-between items-center glass-card rounded-2xl p-4 mb-4">
            <div>
                <p class="text-gray-400 text-xs">Available Points</p>
                <p id="availablePoints" class="text-2xl font-bold text-red-400">2,500</p>
            </div>
            <button onclick="location.href='history.html'" class="text-sm text-gray-400 hover:text-white">History</button>
        </div>

        <!-- Categories -->
        <div class="flex gap-3 overflow-x-auto pb-2 scrollbar-hide">
            <button onclick="filterCategory('all')" class="category-btn px-4 py-2 rounded-full bg-red-600 text-sm font-medium whitespace-nowrap">All</button>
            <button onclick="filterCategory('gaming')" class="category-btn px-4 py-2 rounded-full glass-card text-sm font-medium whitespace-nowrap">Gaming</button>
            <button onclick="filterCategory('merch')" class="category-btn px-4 py-2 rounded-full glass-card text-sm font-medium whitespace-nowrap">Merch</button>
            <button onclick="filterCategory('events')" class="category-btn px-4 py-2 rounded-full glass-card text-sm font-medium whitespace-nowrap">Events</button>
            <button onclick="filterCategory('food')" class="category-btn px-4 py-2 rounded-full glass-card text-sm font-medium whitespace-nowrap">Food</button>
        </div>
    </div>

    <!-- Featured Reward -->
    <div class="px-6 mb-6">
        <div class="relative rounded-3xl overflow-hidden group active:scale-95 transition-transform">
            <img src="http://static.photos/gaming/640x360/42" alt="Featured" class="w-full h-48 object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"></div>
            <div class="absolute bottom-0 left-0 right-0 p-6">
                <span class="bg-red-600 text-xs font-bold px-3 py-1 rounded-full">FEATURED</span>
                <h3 class="text-xl font-bold mt-2">Mineski Infinity Jersey 2024</h3>
                <p class="text-gray-300 text-sm mt-1">Limited Edition Pro Team Jersey</p>
                <div class="flex justify-between items-center mt-4">
                    <span class="text-2xl font-bold text-red-400">1,500 PTS</span>
                    <button onclick="redeemItem('Mineski Infinity Jersey', 1500)" class="bg-white text-black px-6 py-2 rounded-full font-bold text-sm">Redeem</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Rewards Grid -->
    <div class="px-6">
        <h3 class="font-bold text-lg mb-4">Available Rewards</h3>
        <div id="rewardsGrid" class="grid grid-cols-2 gap-4">
            <!-- Rewards populated by JS -->
        </div>
    </div>

    <!-- Redeem Modal -->
    <div id="redeemModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-6">
        <div class="bg-[#1a1a2e] w-full max-w-sm rounded-3xl p-6">
            <div class="w-16 h-16 mx-auto bg-red-500/20 rounded-full flex items-center justify-center mb-4">
                <i data-lucide="gift" class="w-8 h-8 text-red-400"></i>
            </div>
            <h3 class="text-xl font-bold text-center mb-2">Confirm Redemption</h3>
            <p id="redeemText" class="text-center text-gray-400 text-sm mb-6">Redeem item for points?</p>
            <div class="flex gap-3">
                <button onclick="closeRedeemModal()" class="flex-1 glass-card py-3 rounded-xl font-medium">Cancel</button>
                <button onclick="confirmRedeem()" class="flex-1 bg-gradient-to-r from-red-600 to-orange-600 py-3 rounded-xl font-bold">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bottom-nav px-6 py-4 pb-8">
        <div class="flex justify-around items-center">
            <button onclick="location.href='dashboard.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-white">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-xs font-medium">Home</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-red-500">
                <i data-lucide="gift" class="w-6 h-6"></i>
                <span class="text-xs font-medium">Rewards</span>
            </button>
            <button onclick="location.href='scan.html'" class="flex flex-col items-center -mt-8">
                <div class="w-14 h-14 bg-gradient-to-r from-red-600 to-orange-600 rounded-full flex items-center justify-center shadow-lg shadow-red-600/30">
                    <i data-lucide="scan" class="w-7 h-7 text-white"></i>
                </div>
                <span class="text-xs font-medium mt-1">Scan</span>
            </button>
            <button onclick="location.href='earn.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-white">
                <i data-lucide="zap" class="w-6 h-6"></i>
                <span class="text-xs font-medium">Earn</span>
            </button>
            <button onclick="location.href='profile.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-white">
                <i data-lucide="user" class="w-6 h-6"></i>
                <span class="text-xs font-medium">Profile</span>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        if (!localStorage.getItem('userLoggedIn')) {
            window.location.href = 'index.html';
        }

        const rewards = [
            { id: 1, name: 'Steam Wallet ₱100', points: 1000, category: 'gaming', image: 'technology', icon: 'gamepad-2' },
            { id: 2, name: 'Mineski Cap', points: 800, category: 'merch', image: 'people', icon: 'hat' },
            { id: 3, name: 'GGWP Meal', points: 350, category: 'food', image: 'food', icon: 'utensils' },
            { id: 4, name: 'Tournament Pass', points: 2000, category: 'events', image: 'event', icon: 'ticket' },
            { id: 5, name: 'Razer Mouse', points: 3500, category: 'gaming', image: 'technology', icon: 'mouse' },
            { id: 6, name: 'Gaming Chair 10%', points: 500, category: 'gaming', image: 'workspace', icon: 'armchair' },
            { id: 7, name: 'Team Sticker Pack', points: 200, category: 'merch', image: 'minimal', icon: 'sticker' },
            { id: 8, name: 'VIP Lounge Access', points: 1500, category: 'events', image: 'indoor', icon: 'crown' },
        ];

        let selectedReward = null;

        function updatePoints() {
            const points = localStorage.getItem('userPoints') || '0';
            document.getElementById('availablePoints').textContent = parseInt(points).toLocaleString();
        }

        function renderRewards(category = 'all') {
            const grid = document.getElementById('rewardsGrid');
            const filtered = category === 'all' ? rewards : rewards.filter(r => r.category === category);
            
            grid.innerHTML = filtered.map(reward => `
                <div class="reward-card rounded-2xl overflow-hidden active:scale-95 transition-transform">
                    <div class="h-32 bg-gradient-to-br from-gray-800 to-gray-900 flex items-center justify-center">
                        <i data-lucide="${reward.icon}" class="w-12 h-12 text-gray-600"></i>
                    </div>
                    <div class="p-4">
                        <h4 class="font-semibold text-sm mb-1 line-clamp-1">${reward.name}</h4>
                        <p class="text-red-400 font-bold text-lg mb-3">${reward.points} PTS</p>
                        <button onclick="redeemItem('${reward.name}', ${reward.points})" 
                                class="w-full bg-white/10 hover:bg-white/20 transition-colors py-2 rounded-xl text-sm font-medium">
                            Redeem
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterCategory(cat) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('bg-red-600');
                btn.classList.add('glass-card');
            });
            event.target.classList.remove('glass-card');
            event.target.classList.add('bg-red-600');
            renderRewards(cat);
        }

        function redeemItem(name, points) {
            const currentPoints = parseInt(localStorage.getItem('userPoints') || '0');
            if (currentPoints < points) {
                alert('Insufficient points! Complete quests to earn more.');
                return;
            }
            selectedReward = { name, points };
            document.getElementById('redeemText').textContent = `Redeem ${name} for ${points} points?`;
            document.getElementById('redeemModal').classList.remove('hidden');
        }

        function closeRedeemModal() {
            document.getElementById('redeemModal').classList.add('hidden');
            selectedReward = null;
        }

        function confirmRedeem() {
            if (!selectedReward) return;
            
            let current = parseInt(localStorage.getItem('userPoints') || '0');
            current -= selectedReward.points;
            localStorage.setItem('userPoints', current);
            
            const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            transactions.unshift({
                type: 'spent',
                points: selectedReward.points,
                description: `Redeemed: ${selectedReward.name}`,
                date: new Date().toISOString()
            });
            localStorage.setItem('transactions', JSON.stringify(transactions));
            
            updatePoints();
            closeRedeemModal();
            alert(`🎉 Successfully redeemed ${selectedReward.name}!`);
        }

        updatePoints();
        renderRewards();
    </script>
</body>
</html>
