<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mineski Infinity - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%);
        }
        .points-card {
            background: linear-gradient(135deg, #dc2626 0%, #ea580c 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .action-btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .bottom-nav {
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .animate-slide-up {
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="gradient-bg text-white pb-24">
    <!-- Header -->
    <div class="px-6 pt-12 pb-4 flex justify-between items-center">
        <div>
            <p class="text-gray-400 text-sm">Welcome back, Gamer</p>
            <div class="flex items-center gap-2 mt-1">
                <span id="userPhone" class="font-semibold">+63 ••• ••• ••••</span>
                <i data-lucide="chevron-right" class="w-4 h-4 text-gray-400"></i>
            </div>
        </div>
        <div class="flex gap-3">
            <button class="p-2 rounded-full glass-card relative">
                <i data-lucide="bell" class="w-5 h-5"></i>
                <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
            </button>
            <button onclick="logout()" class="p-2 rounded-full glass-card">
                <i data-lucide="log-out" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- Points Balance Card -->
    <div class="px-6 mb-6">
        <div class="points-card rounded-3xl p-6 shadow-2xl shadow-red-900/50 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-red-100 text-sm font-medium mb-1">TOTAL MINESKI POINTS</p>
                        <h2 id="pointsBalance" class="text-4xl font-bold tracking-tight">2,500</h2>
                        <p class="text-red-100 text-xs mt-1">≈ ₱250.00 value</p>
                    </div>
                    <div class="bg-white/20 p-2 rounded-xl">
                        <i data-lucide="gem" class="w-6 h-6 text-white"></i>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="showCashIn()" class="flex-1 bg-white/20 hover:bg-white/30 transition-colors rounded-xl py-3 text-sm font-semibold backdrop-blur-sm">
                        Cash In
                    </button>
                    <button onclick="showTransfer()" class="flex-1 bg-white/20 hover:bg-white/30 transition-colors rounded-xl py-3 text-sm font-semibold backdrop-blur-sm">
                        Transfer
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions Grid -->
    <div class="px-6 mb-6">
        <div class="grid grid-cols-4 gap-3">
            <button onclick="location.href='scan.html'" class="action-btn rounded-2xl p-4 flex flex-col items-center gap-2 active:scale-95 transition-transform">
                <div class="w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center">
                    <i data-lucide="scan-line" class="w-6 h-6 text-blue-400"></i>
                </div>
                <span class="text-xs font-medium">Scan</span>
            </button>
            <button onclick="location.href='rewards.html'" class="action-btn rounded-2xl p-4 flex flex-col items-center gap-2 active:scale-95 transition-transform">
                <div class="w-12 h-12 rounded-full bg-purple-500/20 flex items-center justify-center">
                    <i data-lucide="gift" class="w-6 h-6 text-purple-400"></i>
                </div>
                <span class="text-xs font-medium">Rewards</span>
            </button>
            <button onclick="location.href='earn.html'" class="action-btn rounded-2xl p-4 flex flex-col items-center gap-2 active:scale-95 transition-transform">
                <div class="w-12 h-12 rounded-full bg-green-500/20 flex items-center justify-center">
                    <i data-lucide="target" class="w-6 h-6 text-green-400"></i>
                </div>
                <span class="text-xs font-medium">Earn</span>
            </button>
            <button onclick="location.href='history.html'" class="action-btn rounded-2xl p-4 flex flex-col items-center gap-2 active:scale-95 transition-transform">
                <div class="w-12 h-12 rounded-full bg-orange-500/20 flex items-center justify-center">
                    <i data-lucide="scroll-text" class="w-6 h-6 text-orange-400"></i>
                </div>
                <span class="text-xs font-medium">History</span>
            </button>
        </div>
    </div>

    <!-- Featured Promos -->
    <div class="px-6 mb-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-lg">Featured Drops</h3>
            <button class="text-red-400 text-sm font-medium">See All</button>
        </div>
        <div class="space-y-3">
            <div class="glass-card rounded-2xl p-4 flex items-center gap-4">
                <div class="w-16 h-16 rounded-xl bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="trophy" class="w-8 h-8 text-white"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-semibold text-sm">MPL Season 12 Finals</h4>
                    <p class="text-gray-400 text-xs mt-1">Watch & Earn 500 PTS</p>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="text-xs bg-red-500/20 text-red-400 px-2 py-1 rounded-full">Live Now</span>
                    </div>
                </div>
                <button onclick="earnPoints(500, 'MPL Watch Reward')" class="bg-red-600 hover:bg-red-700 transition-colors px-4 py-2 rounded-xl text-sm font-semibold">
                    Claim
                </button>
            </div>

            <div class="glass-card rounded-2xl p-4 flex items-center gap-4">
                <div class="w-16 h-16 rounded-xl bg-gradient-to-br from-purple-600 to-pink-800 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="shopping-bag" class="w-8 h-8 text-white"></i>
                </div>
                <div class="flex-1">
                    <h4 class="font-semibold text-sm">Mineski Merch Store</h4>
                    <p class="text-gray-400 text-xs mt-1">20% OFF with Points</p>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="text-xs bg-purple-500/20 text-purple-400 px-2 py-1 rounded-full">Limited</span>
                    </div>
                </div>
                <button onclick="location.href='rewards.html'" class="glass-card hover:bg-white/10 transition-colors px-4 py-2 rounded-xl text-sm font-semibold">
                    Shop
                </button>
            </div>
        </div>
    </div>

    <!-- Recent Activity -->
    <div class="px-6">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-lg">Recent Activity</h3>
            <button onclick="location.href='history.html'" class="text-red-400 text-sm font-medium">View All</button>
        </div>
        <div id="recentActivity" class="space-y-3">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="fixed bottom-0 left-0 right-0 bottom-nav px-6 py-4 pb-8">
        <div class="flex justify-around items-center">
            <button class="flex flex-col items-center gap-1 text-red-500">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-xs font-medium">Home</span>
            </button>
            <button onclick="location.href='rewards.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-white transition-colors">
                <i data-lucide="gift" class="w-6 h-6"></i>
                <span class="text-xs font-medium">Rewards</span>
            </button>
            <button onclick="location.href='scan.html'" class="flex flex-col items-center -mt-8">
                <div class="w-14 h-14 bg-gradient-to-r from-red-600 to-orange-600 rounded-full flex items-center justify-center shadow-lg shadow-red-600/30">
                    <i data-lucide="scan" class="w-7 h-7 text-white"></i>
                </div>
                <span class="text-xs font-medium mt-1">Scan</span>
            </button>
            <button onclick="location.href='earn.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-white transition-colors">
                <i data-lucide="zap" class="w-6 h-6"></i>
                <span class="text-xs font-medium">Earn</span>
            </button>
            <button onclick="location.href='profile.html'" class="flex flex-col items-center gap-1 text-gray-400 hover:text-white transition-colors">
                <i data-lucide="user" class="w-6 h-6"></i>
                <span class="text-xs font-medium">Profile</span>
            </button>
        </div>
    </div>

    <!-- Cash In Modal -->
    <div id="cashInModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-end sm:items-center justify-center">
        <div class="bg-[#1a1a2e] w-full sm:w-96 rounded-t-3xl sm:rounded-3xl p-6 animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Cash In Points</h3>
                <button onclick="closeModal('cashInModal')" class="p-2 hover:bg-white/10 rounded-full">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="addPoints(100)" class="glass-card p-4 rounded-xl text-center hover:bg-white/10 transition-colors">
                        <p class="text-2xl font-bold text-red-400">100</p>
                        <p class="text-xs text-gray-400 mt-1">₱10</p>
                    </button>
                    <button onclick="addPoints(500)" class="glass-card p-4 rounded-xl text-center hover:bg-white/10 transition-colors">
                        <p class="text-2xl font-bold text-red-400">500</p>
                        <p class="text-xs text-gray-400 mt-1">₱50</p>
                    </button>
                    <button onclick="addPoints(1000)" class="glass-card p-4 rounded-xl text-center hover:bg-white/10 transition-colors">
                        <p class="text-2xl font-bold text-red-400">1K</p>
                        <p class="text-xs text-gray-400 mt-1">₱100</p>
                    </button>
                </div>
                <div class="glass-card rounded-xl p-4">
                    <label class="text-xs text-gray-400">Custom Amount</label>
                    <input type="number" id="customAmount" placeholder="Enter points" class="w-full bg-transparent text-2xl font-bold outline-none mt-2">
                </div>
                <button onclick="addCustomPoints()" class="w-full bg-gradient-to-r from-red-600 to-orange-600 py-4 rounded-xl font-bold">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // Check auth
        if (!localStorage.getItem('userLoggedIn')) {
            window.location.href = 'index.html';
        }

        // Load user data
        document.getElementById('userPhone').textContent = localStorage.getItem('userPhone') || '+63 ••• ••• ••••';
        
        function updatePoints() {
            const points = localStorage.getItem('userPoints') || '0';
            document.getElementById('pointsBalance').textContent = parseInt(points).toLocaleString();
        }
        updatePoints();

        // Recent transactions
        function loadRecentActivity() {
            const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            const recent = transactions.slice(0, 3);
            const container = document.getElementById('recentActivity');
            
            if (recent.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-4 text-sm">No recent activity</p>';
                return;
            }
            
            container.innerHTML = recent.map(t => `
                <div class="glass-card rounded-xl p-3 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full ${t.type === 'earned' ? 'bg-green-500/20' : 'bg-red-500/20'} flex items-center justify-center">
                        <i data-lucide="${t.type === 'earned' ? 'arrow-down-left' : 'arrow-up-right'}" class="w-5 h-5 ${t.type === 'earned' ? 'text-green-400' : 'text-red-400'}"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium text-sm">${t.description}</p>
                        <p class="text-xs text-gray-400">${new Date(t.date).toLocaleDateString()}</p>
                    </div>
                    <span class="font-bold ${t.type === 'earned' ? 'text-green-400' : 'text-red-400'}">
                        ${t.type === 'earned' ? '+' : '-'}${t.points}
                    </span>
                </div>
            `).join('');
            lucide.createIcons();
        }
        loadRecentActivity();

        function earnPoints(points, description) {
            let current = parseInt(localStorage.getItem('userPoints') || '0');
            current += points;
            localStorage.setItem('userPoints', current);
            
            // Add transaction
            const transactions = JSON.parse(localStorage.getItem('transactions') || '[]');
            transactions.unshift({
                type: 'earned',
                points: points,
                description: description,
                date: new Date().toISOString()
            });
            localStorage.setItem('transactions', JSON.stringify(transactions));
            
            updatePoints();
            loadRecentActivity();
            alert(`🎉 Earned ${points} points!`);
        }

        function addPoints(amount) {
            earnPoints(amount, 'Cash In');
            closeModal('cashInModal');
        }

        function addCustomPoints() {
            const amount = parseInt(document.getElementById('customAmount').value);
            if (amount > 0) {
                addPoints(amount);
            }
        }

        function showCashIn() {
            document.getElementById('cashInModal').classList.remove('hidden');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
        }

        function logout() {
            localStorage.removeItem('userLoggedIn');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
